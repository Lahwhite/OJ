<!-- 题目模块页面：负责承载题目列表或详情的结构骨架 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题目详情 - OJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="h-screen overflow-hidden bg-gray-100">
<!-- 通用容器：负责结构分组和样式挂载 -->
<div class="flex h-full flex-col">
    <!-- 页面头部区域：放导航、标题或操作入口 -->
    <header class="flex items-center justify-between border-b border-gray-200 bg-white px-6 py-3 shadow-sm">
        <!-- 通用容器：负责结构分组和样式挂载 -->
        <div class="flex items-center gap-4">
            <a href="./index.html" class="text-sm font-medium text-indigo-600 hover:text-indigo-700">
                ← 返回题库
            </a>
            <!-- 通用容器：负责结构分组和样式挂载 -->
            <div class="h-6 w-px bg-gray-300"></div>
            <!-- 通用容器：负责结构分组和样式挂载 -->
            <div id="problemTitle" class="flex items-center gap-3">
                <span class="text-sm text-gray-400">加载中...</span>
            </div>
        </div>
        <!-- 通用容器：负责结构分组和样式挂载 -->
        <div class="flex items-center gap-3">
            <a id="homeLink" href="http://127.0.0.1:8081/home"
               class="rounded-lg bg-gray-100 px-4 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-200">
                用户主页
            </a>
        </div>
    </header>

    <!-- 通用容器：负责结构分组和样式挂载 -->
    <div id="notice" class="hidden border-b px-6 py-3 text-sm"></div>

    <!-- 页面主体区域：承载当前页面的核心内容 -->
    <main class="flex flex-1 overflow-hidden">
        <!-- 功能分区：把不同职责的内容按块组织 -->
        <section id="descriptionPanel" class="flex w-1/2 flex-col overflow-hidden border-r border-gray-200 bg-white">
            <!-- 通用容器：负责结构分组和样式挂载 -->
            <div class="flex-1 overflow-y-auto px-6 py-5">
                <!-- 通用容器：负责结构分组和样式挂载 -->
                <div id="problemContent" class="space-y-6">
                    <!-- 通用容器：负责结构分组和样式挂载 -->
                    <div class="flex items-center justify-center py-20 text-gray-400">
                        加载题目信息中...
                    </div>
                </div>
            </div>
        </section>

        <!-- 功能分区：把不同职责的内容按块组织 -->
        <section id="editorPanel" class="flex w-1/2 flex-col overflow-hidden bg-white">
            <!-- 通用容器：负责结构分组和样式挂载 -->
            <div class="flex items-center justify-between border-b border-gray-200 px-4 py-3">
                <!-- 通用容器：负责结构分组和样式挂载 -->
                <div class="flex items-center gap-3">
                    <label for="languageSelect" class="text-sm font-medium text-gray-700">语言:</label>
                    <select id="languageSelect"
                            class="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm outline-none transition focus:ring-2 focus:ring-indigo-400">
                        <option value="cpp">C++</option>
                        <option value="java">Java</option>
                        <option value="python">Python</option>
                        <option value="c">C</option>
                    </select>
                </div>
                <!-- 通用容器：负责结构分组和样式挂载 -->
                <div class="flex items-center gap-2">
                    <!-- 按钮元素：触发一次明确的用户操作 -->
                    <button id="resetButton" type="button"
                            class="rounded-lg bg-gray-100 px-4 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-200">
                        重置代码
                    </button>
                </div>
            </div>

            <!-- 通用容器：负责结构分组和样式挂载 -->
            <div id="monacoEditor" class="flex-1"></div>

            <!-- 通用容器：负责结构分组和样式挂载 -->
            <div class="border-t border-gray-200 bg-gray-50 px-6 py-4">
                <!-- 通用容器：负责结构分组和样式挂载 -->
                <div class="flex items-center justify-between gap-4">
                    <!-- 通用容器：负责结构分组和样式挂载 -->
                    <div class="text-sm text-gray-500">
                        <span>时间限制: <strong id="timeLimit">-</strong></span>
                        <span class="ml-4">内存限制: <strong id="memoryLimit">-</strong></span>
                    </div>
                    <!-- 通用容器：负责结构分组和样式挂载 -->
                    <div class="flex gap-3">
                        <!-- 按钮元素：触发一次明确的用户操作 -->
                        <button id="runButton" type="button"
                                class="rounded-lg bg-gray-700 px-6 py-2.5 font-medium text-white transition hover:bg-gray-800">
                            运行代码
                        </button>
                        <!-- 按钮元素：触发一次明确的用户操作 -->
                        <button id="submitButton" type="button"
                                class="rounded-lg bg-green-600 px-6 py-2.5 font-medium text-white shadow-lg shadow-green-600/30 transition hover:bg-green-700">
                            提交答案
                        </button>
                    </div>
                </div>
            </div>

            <!-- 通用容器：负责结构分组和样式挂载 -->
            <div id="resultPanel" class="hidden border-t border-gray-200 bg-white">
                <!-- 通用容器：负责结构分组和样式挂载 -->
                <div class="px-6 py-4">
                    <!-- 通用容器：负责结构分组和样式挂载 -->
                    <div class="flex items-center justify-between">
                        <h3 class="font-bold text-gray-800">运行结果</h3>
                        <!-- 按钮元素：触发一次明确的用户操作 -->
                        <button id="closeResult" type="button" class="text-gray-400 hover:text-gray-600">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                    <!-- 通用容器：负责结构分组和样式挂载 -->
                    <div id="resultContent" class="mt-3 space-y-2"></div>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script src="./problem-detail.js"></script>
</body>
</html>

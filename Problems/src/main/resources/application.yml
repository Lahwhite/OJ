server:
  address: ${OJ_PROBLEMS_ADDRESS:${OJ_MANAGEMENT_ADDRESS:0.0.0.0}}
  port: ${OJ_PROBLEMS_PORT:${OJ_MANAGEMENT_PORT:8080}}
  servlet:
    context-path: ${OJ_PROBLEMS_CONTEXT_PATH:${OJ_MANAGEMENT_CONTEXT_PATH:/api}}

spring:
  datasource:
    url: ${OJ_DB_URL:jdbc:mysql://localhost:3306/myOJ?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${OJ_DB_USERNAME:Problems}
    password: ${OJ_DB_PASSWORD:Management}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${OJ_JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: ${OJ_SHOW_SQL:false}
  jackson:
    default-property-inclusion: non_null

security:
  jwt:
    secret: ${OJ_JWT_SECRET:oj-management-dev-secret}

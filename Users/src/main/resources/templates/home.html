<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户主页</title>
    <!-- 通过 CDN 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 自定义过渡动画样式 -->
    <style>
        .drawer-transition {
            transition-property: transform;
            transition-duration: 260ms;
            transition-timing-function: cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .overlay-transition {
            transition-property: opacity, visibility;
            transition-duration: 200ms;
        }
        body.no-scroll {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">

<div class="text-2xl font-bold flex">
    <span class="text-gray-800 px-1">欢迎用户</span>
    <span th:text="|${session.loginUser}|" class="text-blue-400 px-1"></span>
    <span class="text-gray-800 px-1">登录本系统</span>
</div>

<div class="text-base text-gray-500 mt-12">
    点击右侧“提问”按钮，体验检索增强生成（RAG）
</div>

<a href="/redirect-port8000" class="fixed right-6 top-[40%] -translate-y-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 flex items-center justify-center gap-2
rounded-2xl shadow-lg shadow-indigo-400/60 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2">
    OI Wiki
</a>
<button id="openDrawer" class="fixed right-6 top-[50%] -translate-y-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 flex items-center justify-center gap-2
rounded-2xl shadow-lg shadow-indigo-400/60 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2">
    <svg class="h-5 w-5" style="fill: none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    提问
</button>
<a th:href="@{${'http://'+globalIp+':'+problemPort+'/problems'}(username=${session.loginUser}, user_id=${session.problemUserId}, return_url=${'http://'+globalIp+':'+currentPort+'/home'})}"
   class="fixed right-6 top-[60%] -translate-y-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 flex items-center justify-center gap-2
rounded-2xl shadow-lg shadow-indigo-400/60 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2">
    题目
</a>

<a href="/profile" class="fixed left-6 top-[40%] -translate-y-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 flex items-center justify-center gap-2
rounded-2xl shadow-lg shadow-indigo-400/60 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2">
    个人资料
</a>
<a th:href="@{${'http://'+globalIp+':'+discussionPort+'/discussion'}(username=${session.loginUser}, return_url=${'http://'+globalIp+':'+currentPort+'/home'})}"
   class="fixed left-6 top-[50%] -translate-y-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 flex items-center justify-center gap-2
rounded-2xl shadow-lg shadow-indigo-400/60 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2">
    讨论区
</a>
<a th:href="@{${'http://'+globalIp+':'+rankPort+'/rank'}(return_url=${'http://'+globalIp+':'+currentPort+'/home'})}"
   class="fixed left-6 top-[60%] -translate-y-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 flex items-center justify-center gap-2
rounded-2xl shadow-lg shadow-indigo-400/60 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2">
    排行榜
</a>

<!-- 底部链接 -->
<div class="mt-24 text-lg">
    <a href="/sandbox" class="text-blue-400 hover:underline">在线代码运行</a>
</div>
<div class="mt-8 text-lg">
    <a href="/logout" class="text-blue-400 hover:underline">用户登出</a>
</div>

<!-- ========= 新增：RAG问答抽屉面板（不影响任何原有功能） ========= -->
<!-- 遮罩层 -->
<div id="drawerOverlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-40 overlay-transition opacity-0 invisible pointer-events-none"></div>

<!-- 抽屉侧边栏 -->
<aside id="ragDrawer" class="fixed top-0 right-0 h-full w-[85vw] sm:w-[96] md:w-[28rem] bg-white shadow-2xl z-50 flex flex-col drawer-transition translate-x-full">
    <!-- 头部 -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
        <div class="flex items-center gap-2">
            <div class="h-8 w-8 rounded-xl bg-indigo-100 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                </svg>
            </div>
            <h5 class="text-xl font-bold text-gray-800">OI Wiki知识库问答</h5>
        </div>
        <button id="closeDrawerBtn" class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-full hover:bg-gray-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <!-- 主体内容 -->
    <div class="flex-1 overflow-y-auto px-5 py-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">你的问题</label>
            <textarea id="questionInput" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 transition bg-gray-50 resize-none" rows="4" placeholder="例如：什么是动态规划？有什么经典例题？"></textarea>
        </div>
        <button id="submitQueryBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 px-4 rounded-xl shadow-md transition-all duration-200 flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            提交查询
        </button>
        <div class="relative">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
            <div class="relative flex justify-center text-xs"><span class="bg-white px-2 text-gray-400">智能回答</span></div>
        </div>
        <div id="answerArea" class="mt-1 p-4 bg-gray-50/70 rounded-xl border border-gray-100 min-h-[120px] text-gray-700 text-sm leading-relaxed">
            <div class="flex items-start gap-2 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
                </svg>
                <span>等待提问，回答内容将显示在这里...</span>
            </div>
        </div>
    </div>
    <div class="p-3 text-center text-xs text-gray-400 border-t border-gray-100">基于 RAG 知识库 · 实时检索</div>
</aside>

<script src="/js/rag-drawer.js"></script>

</body>
</html>

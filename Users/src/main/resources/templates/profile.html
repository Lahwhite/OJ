<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>个人资料页面</title>
    <!-- 通过 CDN 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex-col flex items-center justify-center">

<!-- 个人资料卡片 -->
<div class="w-full max-w-xl bg-white rounded-3xl shadow-xl p-8 mx-4">
    <div class="flex flex-col items-center">
        <!-- 头像 -->
        <div class="relative mb-6 group">
            <img id="avatarPreview"
                 th:src="${avatarUrl != null and !avatarUrl.isEmpty()} ? ${avatarUrl} : '/images/default-avatar.png'"
                 alt="头像"
                 class="w-32 h-32 rounded-full object-cover border-4 border-indigo-200 shadow-md transition-transform group-hover:scale-105">
            <label for="avatarInput"
                   class="absolute bottom-0 right-0 bg-indigo-600 text-white p-2 rounded-full cursor-pointer shadow hover:bg-indigo-700 transition">
                <svg class="w-4 h-4" style="fill: none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </label>
        </div>

        <!-- 用户名（无法编辑） -->
        <p class="text-2xl font-bold text-gray-800" th:text="${session.loginUser}">
            用户名
        </p>
        <p class="mt-1 text-gray-400 text-sm">
            （登录账号）
        </p>
    </div>

    <form action="/profile" method="post" enctype="multipart/form-data" class="mt-8 space-y-5">
        <!-- 昵称 -->
        <div>
            <label for="nickname" class="block text-sm font-medium text-gray-700 mb-2">昵称</label>
            <input type="text" id="nickname" name="nickname"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none transition"
                   placeholder="起一个酷炫的昵称"
                   th:value="${nickname}">
        </div>

        <!-- 个性签名 -->
        <div>
            <label for="signature" class="block text-sm font-medium text-gray-700 mb-2">个性签名</label>
            <textarea id="signature" name="signature" rows="3"
                      class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none transition resize-none"
                      placeholder="写一句个性签名秀出态度..."
                      th:text="${signature}"></textarea>
        </div>

        <input type="file" id="avatarInput" name="avatar"
               accept="image/jpeg,image/png,image/bmp,image/gif"
               class="hidden">

        <div class="flex justify-center gap-12 pt-2">
            <button type="submit"
                    class="px-8 py-3 bg-indigo-600 text-white font-medium rounded-xl shadow-lg shadow-indigo-400/40 hover:bg-indigo-700 transition-all focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2">
                保存修改
            </button>
            <a href="/home"
               class="px-8 py-3 bg-gray-200 text-gray-700 font-medium rounded-xl hover:bg-gray-300 transition-all">
                返回主页
            </a>
        </div>
    </form>

    <!-- 可选信息 -->
    <div th:if="${successMsg}" class="mt-6 text-center text-green-600 bg-green-50 py-2 px-4 rounded-lg">
        <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="mt-6 text-center text-red-600 bg-red-50 py-2 px-4 rounded-lg">
        <span th:text="${errorMsg}"></span>
    </div>
</div>

<script src="/js/profile.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>在线代码运行</title>
    <!-- 通过 CDN 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">

<div class="text-3xl font-bold text-gray-800 mt-8 mb-8">在线运行代码</div>

<!-- 代码运行表单 -->
<form id="form" method="post" action="/sandbox" class="p-10 rounded-lg shadow-md w-full max-w-2xl space-y-5">
    <!-- 选择编程语言 -->
    <div>
        <label class="text-xl block">
            编程语言：
            <select id="language" name="language" required
                    class="w-full px-3 mt-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">-- 请选择语言 --</option>
                <option th:each="lang : ${languages}" th:value="${lang}" th:text="${lang}"></option>
            </select>
        </label>
    </div>

    <!-- 代码输入区 -->
    <div>
        <label class="text-xl block">
            代码：
            <textarea id="code" name="code" rows="12" placeholder="在此输入你的代码..." required
                      class="w-full px-3 mt-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"></textarea>
        </label>
    </div>

    <!-- 运行按钮 -->
    <div class="flex items-center">
        <button type="submit"
                id="target"
                class="mt-6 blur-leave w-1/3 mx-auto bg-blue-500 text-white py-4 rounded-lg hover:bg-blue-600 transition-colors font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
            运行代码
        </button>
    </div>

    <!-- 可选信息：错误提示 -->
    <div th:if="|${errorMsg}|">
        <p th:text="|${errorMsg}|" class="text-center text-red-500 mt-4 text-lg"></p>
    </div>
</form>

<!-- 输出结果 -->
<div class="mt-6 w-full max-w-2xl">
    <label class="text-xl font-medium text-gray-700">
        运行结果：
        <textarea class="w-full mt-3 p-5 border border-gray-200 rounded-lg min-h-36 max-h-96 overflow-auto whitespace-pre-wrap font-mono text-sm text-gray-800 shadow-inner"
             id="output" th:text="|${output}|" readonly>
        </textarea>
    </label>
</div>

<div id="hint" class="text-center text-base text-gray-700 mt-3 opacity-0 transition-opacity duration-200">你发现我了，我是为了美观而在这里的占位符 :)</div>
<script src="/js/form-hint.js"></script>

<!-- 底部链接 -->
<div class="mt-3 text-lg">
    <a href="/home" class="text-blue-400 hover:underline">返回用户主页</a>
</div>
<div class="mt-3 text-lg">
    <a href="/logout" class="text-blue-400 hover:underline">退出登录</a>
</div>

</body>
</html>

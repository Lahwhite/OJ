<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>登录界面</title>
    <!-- 通过 CDN 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">

<h2 class="text-3xl font-bold text-gray-800 mb-6">用户登录</h2>

<!-- 通过 POST 方法提交数据 -->
<form id="form" method="post" action="/login" class="p-14 rounded-lg shadow-md w-full max-w-lg space-y-6">
    <!-- 用户名输入框 -->
    <div>
        <label class="text-xl">
            用户名：
            <input type="text"
                   id="username"
                   name="username"
                   autocomplete="username"
                   required
                   class="w-full px-3 mt-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
    </div>
    <!-- 密码输入框 -->
    <div>
        <label class="text-xl">
            密 码：
            <!-- 不要自动保存密码 -->
            <input type="password"
                   id="password"
                   name="password"
                   autocomplete="new-password"
                   required
                   class="w-full px-3 mt-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
    </div>

    <!-- 登录按钮 -->
    <div class="flex items-center">
        <button type="submit"
                id="target"
                class="mt-6 blur-leave w-1/3 mx-auto bg-blue-500 text-white py-4 rounded-lg hover:bg-blue-600 transition-colors font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
            登录
        </button>
    </div>

    <!-- 可选信息 -->
    <div th:if="|${errorMsg}|">
        <p th:text="|${errorMsg}|" class="text-center text-red-500 mt-4 text-lg"></p>
    </div>
    <div th:if="|${successMsg}|">
        <p th:text="|${successMsg}|" class="text-center text-green-500 mt-4 text-lg"></p>
    </div>
</form>

<div id="hint" class="text-center text-base text-gray-700 mt-6 opacity-0 transition-opacity duration-200">你发现我了，我是为了美观而在这里的占位符 :)</div>
<script src="/js/form-validate.js"></script>

<!-- 底部链接 -->
<div class="mt-8 text-lg">
    <a href="/register" class="text-blue-400 hover:underline">没有账户？点击注册</a>
</div>
<div class="mt-8 text-lg">
    <a href="/index" class="text-blue-400 hover:underline">返回首页</a>
</div>

</body>
</html>

# 应用名称
spring:
  application:
    name: Users

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/myOJ?useUnicode=true&characterEncoding=utf-8&characterSetResults=utf8mb4&connectionCollation=utf8mb4_unicode_ci
    username: User
    password: Management
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: ''
    database: 0

  # Spring Session 共享（Redis存储）
  session:
    store-type: redis
    timeout: 3600

# 服务器配置
server:
  port: 8081
  address: 0.0.0.0
  servlet:
    session:
      cookie:
        # 让 JSESSIONID 作用域为 根域名，忽略端口
        path: /

# 微服务端口配置
service:
  problem:
    port: 8080
  discussion:
    port: 8079
  rank:
    port: 8092

# 日志配置
logging:
  level:
    org.example.users: DEBUG